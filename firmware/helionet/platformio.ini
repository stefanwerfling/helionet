[platformio]
default_envs = htm00

[common]
platform = espressif32
board = esp32dev
framework = arduino

board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_upload.flash_size = 8MB
board_upload.maximum_size = 3342336

lib_deps =
    jgromes/RadioLib@^7.1.0
    olikraus/U8g2@^2.36.5

# Production envs build everything except the probe playground.
build_src_filter = +<*> -<probe/>

upload_speed = 921600
upload_protocol = esptool
monitor_speed = 115200

# Default build: CH0 (NSS=18, RST=14, DIO0=26)
[env:htm00]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Diagnostic build: CH1 (NSS=23, RST=13, DIO0=25) — second SX1276 on the HT-M00.
# Pinout extracted from Heltec V2.0 stock firmware via Ghidra.
[env:htm00_ch1]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_CH1
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Full-duplex build: CH0 transmits, CH1 receives, both run concurrently
# on the shared SPI bus. The two chips can hold different frequencies/SF.
[env:htm00_duplex]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_DUPLEX
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Diagnostic: SX1276 RFO output stage instead of the default PA_BOOST.
# A board whose PA_BOOST trace is broken (but RFO is intact) will only
# transmit through this build. CH0, half-duplex.
[env:htm00_rfo]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_RFO
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# RFO + CH1 (second SX1276) — for full-matrix diagnosis.
[env:htm00_ch1_rfo]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_CH1
    -DUSE_RFO
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Standalone OLED driver-probe firmware — cycles through several U8g2
# constructors until we see which one renders the panel cleanly. Replaces
# main.cpp entirely (different src filter, different lib_deps).
[env:htm00_oledprobe]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<probe/oled_probe.cpp>
lib_deps =
    olikraus/U8g2@^2.36.5
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# WiFi-bridge build: same LoRa stack as htm00, plus the wire-protocol is
# also available over UDP/7000 and a tiny WebUI at http://<ip>/.
# Needs include/WiFiCreds.h (gitignored) — copy WiFiCreds.h.example.
[env:htm00_wifi]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_WIFI_BRIDGE
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# -------------------------------------------------------------------------
# Heltec WiFi LoRa 32 V3 — ESP32-S3 + SX1262 + SSD1306 128×64.
# Different chip family from the HT-M00, so the [common] block (with its
# esp32dev / 8MB flash settings) doesn't apply — we have a separate base.
# -------------------------------------------------------------------------
[common_heltec_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
lib_deps =
    jgromes/RadioLib@^7.1.0
    olikraus/U8g2@^2.36.5
build_src_filter = +<*> -<probe/>
upload_speed = 921600
upload_protocol = esptool
monitor_speed = 115200

# Note: Heltec V3 routes its USB-C through the CP2102 to UART0 (GPIO 43/44).
# The ESP32-S3 native USB pins (GPIO 19/20) are NOT wired to the USB connector
# on this board, so ARDUINO_USB_CDC_ON_BOOT must stay OFF — otherwise Serial
# gets redirected to native USB and nothing comes out on /dev/ttyUSB0.
[env:heltec_v3]
extends = common_heltec_v3
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HELTEC_V3
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

[env:heltec_v3_wifi]
extends = common_heltec_v3
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HELTEC_V3
    -DUSE_WIFI_BRIDGE
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0