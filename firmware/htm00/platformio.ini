[platformio]
default_envs = htm00

[common]
platform = espressif32
board = esp32dev
framework = arduino

board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_upload.flash_size = 8MB
board_upload.maximum_size = 3342336

lib_deps =
    jgromes/RadioLib@^7.1.0
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit SH110X@^2.1.13

upload_speed = 921600
upload_protocol = esptool
monitor_speed = 115200

# Default build: CH0 (NSS=18, RST=14, DIO0=26)
[env:htm00]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Diagnostic build: CH1 (NSS=23, RST=13, DIO0=25) — second SX1276 on the HT-M00.
# Pinout extracted from Heltec V2.0 stock firmware via Ghidra.
[env:htm00_ch1]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_CH1
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Full-duplex build: CH0 transmits, CH1 receives, both run concurrently
# on the shared SPI bus. The two chips can hold different frequencies/SF.
[env:htm00_duplex]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_DUPLEX
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# Diagnostic: SX1276 RFO output stage instead of the default PA_BOOST.
# A board whose PA_BOOST trace is broken (but RFO is intact) will only
# transmit through this build. CH0, half-duplex.
[env:htm00_rfo]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_RFO
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

# RFO + CH1 (second SX1276) — for full-matrix diagnosis.
[env:htm00_ch1_rfo]
extends = common
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSE_CH1
    -DUSE_RFO
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0